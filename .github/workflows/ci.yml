# ============================================================
# missless — CI Pipeline (self-hosted runners)
# Go: lint (vet+staticcheck) ∥ test+build — parallel on self-hosted
# Frontend: type-check, lint, build (Next.js static export)
# Path filter: skip unrelated jobs on PRs (push to main runs all)
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: self-hosted
    timeout-minutes: 2
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'

  go-lint:
    name: Go Lint
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.go == 'true'
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Install staticcheck
        run: |
          GOBIN="${HOME}/.local/bin" go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Staticcheck
        run: staticcheck ./...

  go-test:
    name: Go Test
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.go == 'true'
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Test with race detector
        run: go test -race -count=1 -timeout=60s ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  frontend-ci:
    name: Frontend CI
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    runs-on: self-hosted
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        run: npm run build
